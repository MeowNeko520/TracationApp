<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Tracation</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png?v=1">

  </head>
    
  <body>
  <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊規劃助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 antialiased">

    <header class="bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="goToHome()">
                <i class="fa-solid fa-compass text-2xl animate-pulse"></i>
                <span class="text-xl font-bold tracking-wide">Tracation</span>
            </div>
            <div id="nav-trip-title" class="hidden text-md font-medium bg-white/20 px-3 py-1 rounded-full max-w-[200px] truncate md:max-w-xs">
                </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 mb-20">
        
        <section id="page-home" class="space-y-6">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900 md:text-3xl">我的旅遊計畫</h1>
                    <p class="text-slate-500 text-sm mt-1">開啟你的下一段精采冒險</p>
                </div>
                <button onclick="openTripModal()" class="w-full sm:w-auto bg-sky-600 hover:bg-sky-700 text-white px-5 py-3 rounded-xl font-medium shadow-md transition flex items-center justify-center space-x-2 rounded-card">
                    <i class="fa-solid fa-plus"></i>
                    <span>新增旅遊計畫</span>
                </button>
            </div>

            <div id="trip-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="page-detail" class="hidden space-y-6">
            <div class="flex items-center space-x-3">
                <button onclick="goToHome()" class="bg-white hover:bg-slate-100 p-2.5 rounded-xl border border-slate-200 text-slate-600 transition shadow-sm">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2 id="detail-trip-name" class="text-xl md:text-2xl font-bold text-slate-900 truncate">大阪五日遊</h2>
            </div>

            <div class="bg-white p-1.5 rounded-xl border border-slate-200 flex space-x-1 shadow-sm">
                <button onclick="switchSubTab('itinerary')" id="tab-btn-itinerary" class="flex-1 py-2.5 text-center font-medium rounded-lg transition text-sky-600 bg-sky-50">
                    <i class="fa-solid fa-calendar-day mr-1"></i> 行程規劃
                </button>
                <button onclick="switchSubTab('checklist')" id="tab-btn-checklist" class="flex-1 py-2.5 text-center font-medium rounded-lg transition text-slate-600 hover:bg-slate-50">
                    <i class="fa-solid fa-list-check mr-1"></i> 備忘清單
                </button>
                <button onclick="switchSubTab('vouchers')" id="tab-btn-vouchers" class="flex-1 py-2.5 text-center font-medium rounded-lg transition text-slate-600 hover:bg-slate-50">
                    <i class="fa-solid fa-ticket mr-1"></i> 票券憑證
                </button>
            </div>

            <div id="sub-page-itinerary" class="space-y-4">
                <div id="day-tabs-container" class="flex space-x-2 overflow-x-auto pb-2 scrollbar-none">
                    </div>

                <div class="bg-white border border-slate-200 rounded-card p-4 shadow-sm space-y-4">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <span id="current-day-badge" class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-full text-xs">DAY 1</span>
                            <span id="current-day-date" class="text-sm font-medium text-slate-500">2026-08-11</span>
                        </div>
                        <button onclick="openEventModal()" class="bg-slate-900 hover:bg-slate-800 text-white text-xs px-3 py-2 rounded-lg font-medium transition flex items-center space-x-1">
                            <i class="fa-solid fa-plus"></i> <span>新增行程點</span>
                        </button>
                    </div>

                    <div id="event-timeline-container" class="relative border-l-2 border-slate-100 pl-4 ml-2 space-y-6 my-2">
                        </div>
                </div>

                <div class="bg-white border border-slate-200 rounded-card p-4 shadow-sm space-y-3">
                    <div class="flex items-center justify-between">
                        <h3 class="font-bold text-slate-900 text-sm"><i class="fa-solid fa-tags text-sky-500 mr-1"></i> 分類標籤管理</h3>
                        <button onclick="openTagManagerModal()" class="text-xs text-sky-600 hover:underline"><i class="fa-solid fa-gear mr-0.5"></i> 管理標籤</button>
                    </div>
                    <div id="tag-display-pool" class="flex flex-wrap gap-1.5">
                        </div>
                </div>
            </div>

            <div id="sub-page-checklist" class="hidden bg-white border border-slate-200 rounded-card p-4 shadow-sm space-y-4">
                <div class="flex border-b border-slate-200 pb-2">
                    <button onclick="switchChecklistType('prep')" id="chk-tab-prep" class="border-b-2 border-sky-600 text-sky-600 px-4 py-2 font-medium text-sm transition">行前準備</button>
                    <button onclick="switchChecklistType('luggage')" id="chk-tab-luggage" class="border-b-2 border-transparent text-slate-500 px-4 py-2 font-medium text-sm hover:text-slate-800 transition">行李準備</button>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-xs text-slate-400" id="checklist-count">共 0 項</span>
                    <button onclick="openChecklistModal()" class="bg-slate-100 hover:bg-slate-200 text-slate-7700 text-xs px-2.5 py-1.5 rounded-lg transition font-medium">
                        <i class="fa-solid fa-plus mr-0.5"></i> 新增項目
                    </button>
                </div>
                <div id="checklist-items-container" class="space-y-2">
                    </div>
            </div>

            <div id="sub-page-vouchers" class="hidden space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="font-bold text-slate-900"><i class="fa-solid fa-passport text-indigo-500 mr-1"></i> 我的電子憑證 / 門票</h3>
                    <button onclick="openVoucherModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-2 rounded-lg transition font-medium shadow-sm">
                        <i class="fa-solid fa-plus mr-0.5"></i> 新增憑證
                    </button>
                </div>
                <div id="vouchers-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    </div>
            </div>
        </section>
    </main>

    <div id="modal-trip" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-card shadow-xl p-5 space-y-4">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h3 id="modal-trip-title" class="text-lg font-bold text-slate-900">新增旅遊計畫</h3>
                <button onclick="closeTripModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <input type="hidden" id="form-trip-id">
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block font-medium text-slate-700 mb-1">旅程名稱</label>
                    <input type="text" id="form-trip-name" placeholder="例如：大阪五日遊" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block font-medium text-slate-700 mb-1">開始日期</label>
                        <input type="date" id="form-trip-start" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
                    </div>
                    <div>
                        <label class="block font-medium text-slate-700 mb-1">總天數</label>
                        <input type="number" id="form-trip-days" min="1" max="30" value="5" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
                    </div>
                </div>
            </div>
            <div class="flex space-x-2 pt-2 text-sm">
                <button onclick="closeTripModal()" class="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-lg">取消</button>
                <button onclick="saveTripData()" class="flex-1 bg-sky-600 text-white py-2.5 rounded-lg font-medium">確認儲存</button>
            </div>
        </div>
    </div>

    <div id="modal-event" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-lg rounded-card shadow-xl p-5 space-y-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h3 id="modal-event-title" class="text-lg font-bold text-slate-900">新增行程紀錄</h3>
                <button onclick="closeEventModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <input type="hidden" id="form-event-id">
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block font-medium text-slate-700 mb-1">設定時間</label>
                    <div class="flex items-center space-x-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
                        <div class="flex-1 text-center">
                            <span class="text-xs text-slate-400 block">時 (Hour)</span>
                            <select id="form-event-hour" class="w-full bg-transparent font-bold text-center text-base focus:outline-none py-1 max-h-32 overflow-y-auto"></select>
                        </div>
                        <span class="font-bold text-lg text-slate-400">:</span>
                        <div class="flex-1 text-center">
                            <span class="text-xs text-slate-400 block">分 (Minute)</span>
                            <select id="form-event-min" class="w-full bg-transparent font-bold text-center text-base focus:outline-none py-1"></select>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block font-medium text-slate-700 mb-1">行程標題</label>
                    <input type="text" id="form-event-title-input" placeholder="例如：搭乘星宇航空客機" class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block font-medium text-slate-700 mb-1">主題標籤</label>
                        <select id="form-event-tag" class="w-full px-3 py-2 border border-slate-300 rounded-lg"></select>
                    </div>
                    <div>
                        <label class="block font-medium text-slate-700 mb-1">地點名稱 (將自動整合地圖)</label>
                        <input type="text" id="form-event-location" placeholder="桃園國際機場 / 景點名稱" class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                    </div>
                </div>
                <div>
                    <label class="block font-medium text-slate-700 mb-1">詳細備註 / 說明</label>
                    <textarea id="form-event-note" rows="3" placeholder="航班編號、注意事項..." class="w-full px-3 py-2 border border-slate-300 rounded-lg"></textarea>
                </div>
            </div>
            <div class="flex space-x-2 pt-2 text-sm">
                <button onclick="closeEventModal()" class="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-lg">取消</button>
                <button onclick="saveEventData()" class="flex-1 bg-slate-900 text-white py-2.5 rounded-lg font-medium">儲存行程項目</button>
            </div>
        </div>
    </div>

    <div id="modal-tag-manager" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-card shadow-xl p-5 space-y-4">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h3 class="text-md font-bold text-slate-900">管理自訂標籤</h3>
                <button onclick="closeTagManagerModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-3 bg-slate-50 border border-slate-200 rounded-xl space-y-3 text-xs">
                <input type="hidden" id="form-tag-id">
                <div class="flex gap-2">
                    <input type="text" id="form-tag-name" placeholder="標籤名稱(如: 購物)" class="flex-1 px-2.5 py-1.5 border border-slate-300 rounded-md">
                    <button onclick="saveTagItem()" class="bg-sky-600 text-white px-3 py-1.5 rounded-md font-medium">儲存</button>
                </div>
                <div>
                    <span class="block text-slate-500 mb-1 font-medium">挑選代表色 (12色可選)：</span>
                    <div id="tag-color-picker-grid" class="grid grid-cols-6 gap-2"></div>
                </div>
            </div>
            <div id="tag-manager-list" class="space-y-1 max-h-48 overflow-y-auto text-sm"></div>
        </div>
    </div>

    <div id="modal-checklist" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-card shadow-xl p-5 space-y-4">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h3 id="modal-checklist-title" class="text-md font-bold text-slate-900">新增備忘項目</h3>
                <button onclick="closeChecklistModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input type="hidden" id="form-checklist-id">
            <div class="text-sm space-y-3">
                <div>
                    <label class="block font-medium text-slate-700 mb-1">項目名稱</label>
                    <input type="text" id="form-checklist-text" placeholder="例如：帶護照" class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
            </div>
            <div class="flex space-x-2 text-sm pt-1">
                <button onclick="closeChecklistModal()" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg">取消</button>
                <button onclick="saveChecklistItem()" class="flex-1 bg-sky-600 text-white py-2 rounded-lg font-medium">確認</button>
            </div>
        </div>
    </div>

    <div id="modal-voucher" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-card shadow-xl p-5 space-y-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h3 id="modal-voucher-title" class="text-md font-bold text-slate-900">編輯憑證資料</h3>
                <button onclick="closeVoucherModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input type="hidden" id="form-voucher-id">
            <div class="text-sm space-y-3">
                <div>
                    <label class="block font-medium text-slate-700 mb-1">憑證或門票名稱</label>
                    <input type="text" id="form-voucher-name" placeholder="例如：環球影城 Express Pass 7" class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
                <div>
                    <label class="block font-medium text-slate-700 mb-1">電子碼 / 預約代號 / 序號</label>
                    <input type="text" id="form-voucher-code" placeholder="如：QR-987654321" class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
                <div>
                    <label class="block font-medium text-slate-700 mb-1">詳細備註</label>
                    <textarea id="form-voucher-note" rows="3" placeholder="備註規範..." class="w-full px-3 py-2 border border-slate-300 rounded-lg"></textarea>
                </div>
            </div>
            <div class="flex space-x-2 text-sm pt-1">
                <button onclick="closeVoucherModal()" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg">取消</button>
                <button onclick="saveVoucherItem()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-medium">儲存憑證</button>
            </div>
        </div>
    </div>

    <div id="modal-viewer" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden" onclick="closeViewerModal()">
        <div class="bg-white w-full max-w-md rounded-card shadow-xl p-6 space-y-4" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                <h3 id="view-modal-title" class="text-lg font-bold text-slate-900">詳細資訊</h3>
                <button onclick="closeViewerModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="view-modal-body" class="space-y-3 text-sm text-slate-600 whitespace-pre-line leading-relaxed"></div>
            <div class="pt-2 text-right">
                <button onclick="closeViewerModal()" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-medium">關閉視窗</button>
            </div>
        </div>
    </div>

    <div id="modal-confirm" class="fixed inset-0 bg-slate-900/70 backdrop-blur-xs z-[60] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-xs rounded-card shadow-xl p-5 text-center space-y-4">
            <div class="text-rose-500 text-3xl"><i class="fa-solid fa-circle-exclamation animate-bounce"></i></div>
            <h3 class="font-bold text-slate-900 text-base">安全確認</h3>
            <p id="confirm-modal-text" class="text-slate-500 text-xs">您確定要刪除此項目嗎？刪除後將無法還原。</p>
            <div class="flex space-x-2 text-xs pt-1">
                <button onclick="closeConfirmModal(false)" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg">取消</button>
                <button onclick="closeConfirmModal(true)" class="flex-1 bg-rose-600 text-white py-2 rounded-lg font-medium">是否確定要刪除</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
